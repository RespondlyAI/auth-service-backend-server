server:
  port: 8080

spring:
  application:
    name: auth-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      pool-name: AuthHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:password}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health, metrics

thundermail:
  api:
    url: https://thundermail-web-aws.vercel.app/api/v3
    token: ${THUNDERMAIL_TOKEN:tim_9cd9ac671e3ad8ebc04fb23053057c81}
    from: ${THUNDERMAIL_FROM:kapoorutkarsh17@gmail.com}

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: 604800000
      refresh-token:
        expiration: 604800000
    cors:
      allowed-origins: http://localhost:3000,http://localhost:3001

logging:
  level:
    root: INFO
    in.respondlyai: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.springframework.web.servlet.DispatcherServlet: WARN