# This is an example of local configuration. 
# Copy this to application-local.properties and fill in your actual values.

spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=your_db_username
spring.datasource.password=your_db_password

# JWT Configuration
# Generate a secure key (e.g., openssl rand -base64 32) and paste it here
application.security.jwt.secret-key=CHANGE_ME_WITH_A_SECURE_KEY
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# ThunderMail Credentials
thundermail.api.token=YOUR_THUNDERMAIL_API_TOKEN
thundermail.api.from=YOUR_THUNDERMAIL_FROM_EMAIL
